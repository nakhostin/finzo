<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="0.55" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.25" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="118" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="118" fill="url(#glow)"/>

  <!-- upward growth line -->
  <polyline
    points="126,352 214,286 296,320 386,180"
    fill="none"
    stroke="#ffffff"
    stroke-width="26"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- arrow head -->
  <polyline
    points="322,176 386,176 386,240"
    fill="none"
    stroke="#ffffff"
    stroke-width="26"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- data nodes / coins -->
  <circle cx="126" cy="352" r="20" fill="#ffffff"/>
  <circle cx="214" cy="286" r="20" fill="#bfdbfe"/>
  <circle cx="296" cy="320" r="20" fill="#bfdbfe"/>
</svg>
